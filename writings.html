---
layout: default
title: Writings
permalink: /writings/
---

<h1>Writings</h1>

<ul class="post-list writings-index">
  {% assign posts = site.writings | sort: "date" | reverse %}
  {% for w in posts %}
    {% if w.title %}
      <li>
        <span class="meta">{{ w.date | date: "%B %Y" }}</span>
        <span class="sep">&raquo;</span>
        <a href="{{ w.url | relative_url }}">{{ w.title }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>
